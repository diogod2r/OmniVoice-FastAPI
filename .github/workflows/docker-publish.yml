name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "main.py"
      - "index.html"
      - "docker/gpu/Dockerfile"
      - "docker/cpu/Dockerfile"

jobs:
  build-gpu:
    name: Build GPU image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/gpu/Dockerfile
          push: true
          tags: diogod2r/omnivoice-fastapi:latest
          cache-from: type=registry,ref=diogod2r/omnivoice-fastapi:buildcache-gpu
          cache-to: type=registry,ref=diogod2r/omnivoice-fastapi:buildcache-gpu,mode=max

  build-cpu:
    name: Build CPU image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/cpu/Dockerfile
          push: true
          tags: diogod2r/omnivoice-fastapi:cpu
          cache-from: type=registry,ref=diogod2r/omnivoice-fastapi:buildcache-cpu
          cache-to: type=registry,ref=diogod2r/omnivoice-fastapi:buildcache-cpu,mode=max
